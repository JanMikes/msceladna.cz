volumes:
    postgres-data:
    mailpit-data:
    redis-data:

services:
    redis:
        image: redis:7-alpine
        restart: unless-stopped
        volumes:
            - redis-data:/data
        command: redis-server --appendonly yes
        healthcheck:
            test: [ "CMD", "redis-cli", "ping" ]
            interval: 10s
            timeout: 5s
            retries: 5

    postgres:
        image: postgres:17.0
        restart: unless-stopped
        tty: true
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: strapi
        volumes:
            - postgres-data:/var/lib/postgresql/data
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U postgres" ]
            interval: 10s
            timeout: 5s
            retries: 5

    strapi:
        image: node:24
        restart: unless-stopped
        tty: true
        ports:
            - "1337:1337"
        environment:
            NODE_ENV: production
            HOST: 0.0.0.0
            PORT: 1337
            DATABASE_CLIENT: postgres
            DATABASE_HOST: postgres
            DATABASE_PORT: 5432
            DATABASE_NAME: strapi
            DATABASE_USERNAME: postgres
            DATABASE_PASSWORD: postgres
            DATABASE_SSL: false
            # IMPORTANT: Change these secrets in production!
            APP_KEYS: toBeModified1,toBeModified2
            API_TOKEN_SALT: toBeModifiedApiTokenSalt
            ADMIN_JWT_SECRET: toBeModifiedAdminJwtSecret
            TRANSFER_TOKEN_SALT: toBeModifiedTransferTokenSalt
            JWT_SECRET: toBeModifiedJwtSecret
            NODE_OPTIONS: "--max-http-header-size=65536"
            REDIS_URL: redis://redis:6379
            # Email Configuration (Mailpit for development)
            SMTP_HOST: mailpit
            SMTP_PORT: "1025"
            SMTP_USER: ""
            SMTP_PASSWORD: ""
            SMTP_SECURE: "false"
            EMAIL_FROM: "notifikace@msceladna.cz"
        working_dir: /app
        volumes:
            - ./strapi:/app
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
            mailpit:
                condition: service_started
        command: bash -c "npm install && npm run dev"

    web:
        image: node:24
        restart: unless-stopped
        tty: true
        working_dir: /app/web
        ports:
            - "3000:3000"
        volumes:
            - .:/app
        environment:
            NODE_ENV: development
            PORT: 3000
            STRAPI_URL: http://strapi:1337
            PUBLIC_UPLOADS_URL: http://localhost:8080
            INTERNAL_UPLOADS_URL: http://nginx
            REDIS_URL: redis://redis:6379
            STRAPI_WEBHOOK_SECRET: dev-webhook-secret
            FORM_TOKEN_SECRET: dev-form-token-secret-at-least-32-chars
            # Email Configuration (Mailpit for development)
            SMTP_HOST: mailpit
            SMTP_PORT: "1025"
            SMTP_USER: ""
            SMTP_PASSWORD: ""
            SMTP_SECURE: "false"
            EMAIL_FROM: "noreply@msceladna.cz"
        depends_on:
            strapi:
                condition: service_started
            nginx:
                condition: service_started
            redis:
                condition: service_healthy
            mailpit:
                condition: service_started
        command: bash -c "cd /app && npm install && cd /app/web && npm run dev"

    nginx:
        image: nginx:alpine
        restart: unless-stopped
        tty: true
        ports:
            - "8080:80"
        volumes:
            - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
            - ./strapi/public/uploads:/var/www/uploads:ro
        depends_on:
            - strapi

    adminer:
        image: adminer:5.4.1
        tty: true
        ports:
            - "8000:8080"
        environment:
            ADMINER_DEFAULT_SERVER: postgres
        depends_on:
            - postgres

    mailpit:
        image: axllent/mailpit:latest
        restart: unless-stopped
        ports:
            - "1025:1025"
            - "8025:8025"
        environment:
            MP_SMTP_AUTH_ACCEPT_ANY: 1
            MP_SMTP_AUTH_ALLOW_INSECURE: 1
            MP_DATABASE: "/data/mailpit.db"
        volumes:
            - mailpit-data:/data
