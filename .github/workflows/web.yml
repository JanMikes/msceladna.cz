name: Web

permissions:
    contents: read
    deployments: write
    packages: write

on:
    push:
        branches:
            - 'main'
        paths:
            - 'web/**'
            - '.github/workflows/web.yml'
    pull_request:
        paths:
            - 'web/**'
            - '.github/workflows/web.yml'

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout
                uses: actions/checkout@v4

            -   name: Setup Node.js
                uses: actions/setup-node@v4
                with:
                    node-version: '22'
                    cache: 'npm'
                    cache-dependency-path: web/package-lock.json

            -   name: Install dependencies
                run: npm ci
                working-directory: web

            -   name: Run lint
                run: npm run lint
                working-directory: web

    test:
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout
                uses: actions/checkout@v4

            -   name: Setup Node.js
                uses: actions/setup-node@v4
                with:
                    node-version: '22'
                    cache: 'npm'
                    cache-dependency-path: web/package-lock.json

            -   name: Install dependencies
                run: npm ci
                working-directory: web

            -   name: Run tests
                run: npm test
                working-directory: web

    docker-image:
        runs-on: ubuntu-latest
        needs:
            - lint
            - test
        if: github.event_name != 'pull_request'
        steps:
            -   name: Checkout
                uses: actions/checkout@v4

            -   name: Docker meta
                id: meta
                uses: docker/metadata-action@v5
                with:
                    images: |
                        ghcr.io/janmikes/msceladna-web
                    tags: |
                        type=ref,event=branch
                        type=ref,event=pr

            -   name: Set up Docker Buildx
                uses: docker/setup-buildx-action@v3

            -   name: Login to GHCR
                uses: docker/login-action@v3
                with:
                    registry: ghcr.io
                    username: ${{ github.repository_owner }}
                    password: ${{ secrets.GITHUB_TOKEN }}

            -   name: Build and push Web
                uses: docker/build-push-action@v6
                with:
                    context: ./web
                    push: true
                    tags: ${{ steps.meta.outputs.tags }}
                    labels: ${{ steps.meta.outputs.labels }}
                    provenance: false
                    sbom: false
                    build-args: |
                        PUBLIC_UPLOADS_URL=https://static.msceladna.cz
                    cache-from: type=registry,ref=ghcr.io/janmikes/msceladna-web:cache
                    cache-to: type=registry,ref=ghcr.io/janmikes/msceladna-web:cache,mode=max,oci-mediatypes=true,compression=zstd,force-compression=true,ignore-error=true

    deploy:
        runs-on: ubuntu-latest
        needs:
            - docker-image
        steps:
            - name: executing remote ssh commands using ssh key
              uses: appleboy/ssh-action@v1
              with:
                host: ${{ secrets.DEPLOY_HOST }}
                username: ${{ secrets.DEPLOY_USERNAME }}
                key: ${{ secrets.DEPLOY_PRIVATE_KEY }}
                script: cd /deployment/msceladna-web && ./deploy-web.sh
